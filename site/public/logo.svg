<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="mcp-wormhole logo">
  <defs>
    <linearGradient id="wh-core" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7840"/>
      <stop offset="0.5" stop-color="#F06A6A"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="wh-ring" x1="0" y1="32" x2="64" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7840" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FF7840"/>
      <stop offset="1" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="wh-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 32) rotate(90) scale(28)">
      <stop stop-color="#FF7840" stop-opacity="0.35"/>
      <stop stop-color="#FF7840" stop-opacity="0"/>
    </radialGradient>
    <filter id="wh-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="30" fill="url(#wh-glow)"/>

  <!-- Outer wormhole ring -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="url(#wh-ring)" stroke-width="2.5" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="url(#wh-ring)" stroke-width="1.5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 32 32" to="0 32 32" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Spiral arms -->
  <path d="M32 32 C22 18, 44 14, 32 32 C20 50, 46 46, 32 32" stroke="url(#wh-core)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M32 32 C18 28, 20 44, 32 32 C44 20, 48 38, 32 32" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="360 32 32" to="0 32 32" dur="9s" repeatCount="indefinite"/>
  </path>

  <!-- Connected tool nodes -->
  <circle cx="32" cy="8" r="3.5" fill="#FF7840" filter="url(#wh-blur)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="54" cy="32" r="3" fill="#F06A6A">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="56" r="3.5" fill="#818CF8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="32" r="3" fill="#FF7840">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Connection pulses -->
  <line x1="32" y1="11" x2="32" y2="22" stroke="#FF7840" stroke-width="1.5" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="51" y1="32" x2="40" y2="32" stroke="#F06A6A" stroke-width="1.5" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/>
  </line>

  <!-- Portal core -->
  <circle cx="32" cy="32" r="9" fill="#0A0A0C" stroke="url(#wh-core)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="4" fill="url(#wh-core)">
    <animate attributeName="r" values="3.5;4.5;3.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
