name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: Package directory under packages/
        required: true
        default: asana
        type: choice
        options:
          - asana

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter "@mcp-wormhole/${{ inputs.package || 'asana' }}" build

      - name: Publish to npm
        working-directory: packages/${{ inputs.package || 'asana' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
